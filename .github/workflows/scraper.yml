name: 🦂 Scorpion Elite - Multi-Source Scraper

on:
  # Ejecutar cada día a las 6:00 AM UTC (= 1:00 AM Colombia/Perú, 3:00 AM Argentina)
  schedule:
    - cron: '0 6 * * *'
  
  # Ejecución manual con parámetros opcionales
  workflow_dispatch:
    inputs:
      source:
        description: 'Fuente específica a scrapear (opcional)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - flashscore
          - transfermarkt
          - soccerway
          - whoscored

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 1: SCRAPING DE PARTIDOS (Flashscore)
  # ═══════════════════════════════════════════════════════════════════════════════
  scrape-flashscore:
    name: 📅 Flashscore - Partidos
    runs-on: ubuntu-latest
    if: github.event.inputs.source == 'all' || github.event.inputs.source == 'flashscore' || github.event.inputs.source == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Run Match Scraper (Flashscore.co)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import os
          from supabase import create_client, Client
          
          from scorpion.scrapers import FlashscoreCoScraper
          
          # Conectar a Supabase
          supabase_url = os.environ.get('SUPABASE_URL')
          supabase_key = os.environ.get('SUPABASE_KEY')
          supabase: Client = create_client(supabase_url, supabase_key)
          
          # Scrape partidos
          scraper = FlashscoreCoScraper()
          partidos = scraper.scrape()
          print(f'Partidos encontrados: {len(partidos)}')
          
          # Guardar en Supabase
          guardados = 0
          errores = 0
          for p in sorted(partidos, key=lambda x: -x['prioridad'])[:20]:
              try:
                  data = {
                      'fixture_id': p['fixture_id'],
                      'fecha': p['fecha'],
                      'hora': p['hora'],
                      'liga': p['liga'],
                      'equipo_local': p['equipo_local'],
                      'equipo_visitante': p['equipo_visitante'],
                      'source_flashscore': True,
                      'estado': 'programado'
                  }
                  result = supabase.table('partidos').upsert(data, on_conflict='fixture_id').execute()
                  guardados += 1
                  print(f'OK: {p[\"liga\"]} - {p[\"equipo_local\"]} vs {p[\"equipo_visitante\"]}')
              except Exception as e:
                  errores += 1
                  print(f'Error: {str(e)[:100]}')
          
          print(f'Guardados: {guardados}, Errores: {errores}')
          "

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 2: SCRAPING DE TABLAS (Transfermarkt)
  # ═══════════════════════════════════════════════════════════════════════════════
  scrape-transfermarkt:
    name: 📊 Transfermarkt - Tablas
    runs-on: ubuntu-latest
    if: github.event.inputs.source == 'all' || github.event.inputs.source == 'transfermarkt' || github.event.inputs.source == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Transfermarkt Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          from scorpion.scrapers import TransfermarktScraper
          scraper = TransfermarktScraper()
          
          # Premier League
          standings = scraper.get_league_standings('Premier League')
          print(f'Premier League: {len(standings)} equipos')
          for eq in standings[:5]:
              print(f\"  {eq.get('posicion')}. {eq.get('equipo')} - {eq.get('puntos')} pts\")
          "
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 3: SCRAPING DE RESULTADOS (Soccerway)
  # ═══════════════════════════════════════════════════════════════════════════════
  scrape-soccerway:
    name: 📜 Soccerway - Resultados
    runs-on: ubuntu-latest
    if: github.event.inputs.source == 'all' || github.event.inputs.source == 'soccerway' || github.event.inputs.source == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Soccerway Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          from scorpion.scrapers import SoccerwayScraper
          scraper = SoccerwayScraper()
          
          results = scraper.get_league_results('Premier League', limit=20)
          print(f'Resultados Premier League: {len(results)}')
          for r in results[:5]:
              print(f\"  {r.get('fecha')}: {r.get('equipo_local')} {r.get('resultado_completo')} {r.get('equipo_visitante')}\")
          "
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 4: SCRAPING DE ESTADÍSTICAS (WhoScored)
  # ═══════════════════════════════════════════════════════════════════════════════
  scrape-whoscored:
    name: ⚡ WhoScored - Estadisticas
    runs-on: ubuntu-latest
    if: github.event.inputs.source == 'all' || github.event.inputs.source == 'whoscored' || github.event.inputs.source == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run WhoScored Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          from scorpion.scrapers import WhoScoredScraper
          scraper = WhoScoredScraper()
          
          matches = scraper.get_upcoming_matches('England')
          print(f'Partidos WhoScored: {len(matches)}')
          for m in matches[:5]:
              print(f\"  {m.get('equipo_local')} vs {m.get('equipo_visitante')} - {m.get('hora')}\")
          "
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 5: SCRAPING COMPLETO (Unificado)
  # ═══════════════════════════════════════════════════════════════════════════════
  scrape-complete:
    name: 🦂 Scraper Unificado
    runs-on: ubuntu-latest
    needs: [scrape-flashscore, scrape-transfermarkt, scrape-soccerway, scrape-whoscored]
    if: github.event.inputs.source == 'all' || github.event.inputs.source == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Complete Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          from scorpion.scrapers import ScraperUnificado
          import json
          
          scraper = ScraperUnificado()
          summary = scraper.run_full_scrape()
          print(json.dumps(summary, indent=2))
          "

      - name: Summary
        run: |
          echo "✅ Multi-source scraping completed"
          echo ""
          echo "📊 Data sources:"
          echo "   - Flashscore: Partidos del dia"
          echo "   - Transfermarkt: Tablas de posiciones"
          echo "   - Soccerway: Resultados historicos"
          echo "   - WhoScored: Estadisticas avanzadas"
          echo ""
          echo "🗄️  Data stored in Supabase"
